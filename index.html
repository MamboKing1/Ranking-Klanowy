    <style>
        :root { --bg: #0b1016; --card: #1c2431; --accent: #00d2ff; --text: #f0f0f0; --gold: #ffcc00; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border-bottom: 3px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { font-family: 'Rajdhani', sans-serif; margin: 0; font-size: 1.4rem; color: var(--accent); letter-spacing: 1px; }
        .subtitle { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        
        #reset-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; font-weight: bold; font-family: 'Rajdhani', sans-serif; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        #reset-btn:active { transform: scale(0.98); background: #00b8e6; }

        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--card); border: 1px solid #2d3848; border-radius: 8px; color: white; box-sizing: border-box; font-size: 1rem; }

        .clan-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent); animation: fadeIn 0.3s ease; }
        .clan-info { flex-grow: 1; min-width: 0; }
        .tag { font-weight: bold; color: var(--gold); font-size: 1.1rem; font-family: 'Rajdhani', sans-serif; }
        .clan-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 180px; vertical-align: middle; }
        .stats { font-size: 0.85rem; color: #bbb; margin-top: 4px; }
        .winrate { font-weight: bold; margin-left: 5px; color: #2ecc71; }
        
        .btn-del { background: rgba(255, 71, 87, 0.15); color: var(--danger); border: 1px solid var(--danger); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-del:active { background: var(--danger); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        function render() {
            const container = document.getElementById('app');
            const searchTxt = document.getElementById('search').value.toLowerCase();
            container.innerHTML = '';
            
            // Filtrowanie przez wyszukiwarkę i usunięte klany
            const filtered = fullClansDatabase.filter(c => {
                const matchesSearch = c.clan_tag.toLowerCase().includes(searchTxt) || c.clan_name.toLowerCase().includes(searchTxt);
                const isNotHidden = !hidden.includes(c.clan_tag);
                return matchesSearch && isNotHidden;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: #888;">Brak klanów spełniających kryteria.</div>';
                return;
            }

            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'clan-card';
                div.innerHTML = `
                    <div class="clan-info">
                        <span style="color: #888; font-size: 0.9rem;">#${c.rank}</span>

                            Pkt: <span style="color: var(--gold)">${c.rating}</span> | WR: <span class="winrate">${c.winrate}</span>
                        </div>
                    </div>
                    <button class="btn-del" onclick="remove('${c.clan_tag}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        window.remove = (tag) => {
            hidden.push(tag);
            localStorage.setItem('hiddenClansStaticFull', JSON.stringify(hidden));
            render();
        };

        window.resetList = () => {
            if(confirm("Czy na pewno chcesz przywrócić wszystkie ukryte klany?")) {
                hidden = [];
                localStorage.removeItem('hiddenClansStaticFull');
                render();
            }
        };
