<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>WoWs Polish Clans</title>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>

<link
href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap"
rel="stylesheet"
/>

<style>

:root{
    --bg:#0b1016;
    --card:#1c2431;
    --accent:#00d2ff;
    --gold:#ffcc00;
    --text:#f0f0f0;
    --danger:#ff4757;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:10px;
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',sans-serif;
}

.header{
    background:var(--card);
    padding:16px;
    border-radius:14px;
    margin-bottom:15px;
    text-align:center;
    border-bottom:3px solid var(--accent);
}

h1{
    margin:0;
    color:var(--accent);
    font-family:'Rajdhani',sans-serif;
    letter-spacing:1px;
}

.subtitle{
    margin-top:5px;
    color:var(--gold);
    font-size:.8rem;
    font-weight:bold;
}

.search-box{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--card);
    color:#fff;
    margin-bottom:14px;
    font-size:1rem;
}

#reset-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:14px;
}

.clan-card{
    background:var(--card);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.clan-info{
    flex:1;
    min-width:0;
    padding-right:10px;
}

.rank{
    color:#888;
    font-weight:bold;
    margin-right:4px;
}

.tag{
    color:var(--gold);
    font-weight:bold;
    font-size:1.05rem;
    font-family:'Rajdhani',sans-serif;
}

.clan-name{
    display:inline-block;
    max-width:180px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    vertical-align:middle;
}

.stats{
    margin-top:5px;
    color:#bbb;
    font-size:.84rem;
}

.winrate{
    color:#2ecc71;
    font-weight:bold;
}

.league{
    padding:2px 6px;
    border-radius:5px;
    font-size:.7rem;
    font-weight:bold;
}

.btn-del{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    background:rgba(255,71,87,.15);
    color:var(--danger);
    cursor:pointer;
}

.loading,
.error,
.empty{
    text-align:center;
    padding:20px;
    color:#999;
}

.error{
    background:rgba(255,71,87,.15);
    border-radius:10px;
    color:#ff4757;
}

/* LEAGUES */

.hrc{
    border-left:4px solid #ff4757;
}

.tyf{
    border-left:4px solid #ffa502;
}

.str{
    border-left:4px solid #1e90ff;
}

.gla{
    border-left:4px solid #2ed573;
}

.squ{
    border-left:4px solid #ced6e0;
}

.hrc-badge{
    background:rgba(255,71,87,.15);
    color:#ff4757;
}

.tyf-badge{
    background:rgba(255,165,2,.15);
    color:#ffa502;
}

.str-badge{
    background:rgba(30,144,255,.15);
    color:#1e90ff;
}

.gla-badge{
    background:rgba(46,213,115,.15);
    color:#2ed573;
}

.squ-badge{
    background:rgba(206,214,224,.15);
    color:#ced6e0;
}

</style>

</head>

<body>

<div class="header">

    <h1>RANKING POLSKICH KLANÓW</h1>

    <div class="subtitle">
        LIVE • World of Warships
    </div>

</div>

<input
type="text"
id="search"
class="search-box"
placeholder="Szukaj po tagu lub nazwie..."
oninput="render()"
/>

<button id="reset-btn" onclick="resetHidden()">

    <i class="fas fa-sync-alt"></i>

    PRZYWRÓĆ UKRYTE KLANY

</button>

<div id="app">

    <div class="loading">
        Ładowanie danych...
    </div>

</div>

<script>

/*
========================================================
SEASON
========================================================
*/

const SEASON = 33;

/*
========================================================
CORS PROXY
========================================================
*/

const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';

/*
========================================================
LEAGUES
========================================================
*/

const LEAGUES = [

    {
        id:0,
        name:'Huragan',
        cls:'hrc',
        badge:'hrc-badge'
    },

    {
        id:1,
        name:'Tajfun',
        cls:'tyf',
        badge:'tyf-badge'
    },

    {
        id:2,
        name:'Sztorm',
        cls:'str',
        badge:'str-badge'
    },

    {
        id:3,
        name:'Wicher',
        cls:'gla',
        badge:'gla-badge'
    },

    {
        id:4,
        name:'Szkwał',
        cls:'squ',
        badge:'squ-badge'
    }

];

/*
========================================================
WHITELISTA
========================================================
*/

const allowedClans = [

"SEEYA",
"P-W-C",
"GRAY",
"ST0RM",
"PWWC",
"YERBA",
"FSO",
"EMP-6",
"SBP",
"-PGS-",
"_PL_",
"-BWM-",
"CREDO",
"-BWMA",
"F11",
"5HARK",
"F-C-P",
"CMWR",
"MORSY",
"-M-W-",
"RR1",
"CMWR2",
"CZCHB",
"MESSA",
"KOYOT",
"EPMW",
"CYRK",
"INT-M",
"-WTH-",
"BRODY",
"BH34",
"WJR",
"LARCH"

];

const allowedSet = new Set(allowedClans);

/*
========================================================
GLOBAL
========================================================
*/

let clans = [];

let hidden = [];

try{

    hidden = JSON.parse(
        localStorage.getItem('wows_hidden') || '[]'
    );

}catch(e){

    hidden = [];

}

/*
========================================================
ESCAPE HTML
========================================================
*/

function escapeHTML(str){

    return String(str).replace(/[&<>"']/g,m=>({

        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'

    })[m]);

}

/*
========================================================
LOAD API
========================================================
*/

async function loadAllClans(){

    const app = document.getElementById('app');

    app.innerHTML = `
        <div class="loading">
            ⏳ Ładowanie rankingu...
        </div>
    `;

    try{

        let all = [];

        for(const league of LEAGUES){

            const baseUrl = `https://clans.worldofwarships.com/api/ladder/structure/?realm=eu&season=${SEASON}&league=${league.id}&division=1&limit=1000&offset=0`;
            
            const apiUrl = CORS_PROXY + baseUrl;

            console.log('📡 Fetchowanie:', league.name);

            const response = await fetch(apiUrl, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            });

            console.log('✓ Response status:', response.status);

            if(!response.ok){
                console.warn('⚠️ Błąd dla ligi:', league.name, response.status);
                continue;
            }

            const data = await response.json();

            console.log('✓ Dane otrzymane dla:', league.name);

            const items = Array.isArray(data.items) ? data.items : 
                          Array.isArray(data.data) ? data.data : 
                          Array.isArray(data.clans) ? data.clans : [];

            if(!items.length){
                console.warn('⚠️ Brak klanów dla ligi:', league.name);
                continue;
            }

            const mapped = items.map(clan => {

                const tag = String(
                    clan.tag ||
                    clan.clan_tag ||
                    clan.public?.tag ||
                    clan.clan?.tag ||
                    ''
                ).trim().toUpperCase();

                const name = String(
                    clan.name ||
                    clan.clan_name ||
                    clan.public?.name ||
                    clan.clan?.name ||
                    'Unknown'
                ).trim();

                const rating = Number(
                    clan.rating ||
                    clan.public_rating ||
                    clan.cb_rating ||
                    0
                ) || 0;

                const wins = Number(
                    clan.wins ||
                    clan.wins_count ||
                    0
                ) || 0;

                const battles = Number(
                    clan.battles ||
                    clan.battles_count ||
                    0
                ) || 0;

                const wr = battles > 0
                    ? ((wins / battles) * 100).toFixed(1)
                    : '0.0';

                return {
                    clan_tag: tag,
                    clan_name: name,
                    rating: rating,
                    winrate: `${wr}%`,
                    league: league.name,
                    l_cls: league.cls,
                    badge: league.badge
                };

            }).filter(clan => clan.clan_tag && allowedSet.has(clan.clan_tag));

            console.log(`✓ ${mapped.length} klanów znaleziono dla ligi: ${league.name}`);

            all.push(...mapped);

        }

        if(all.length === 0){
            app.innerHTML = `
                <div class="error">
                    ❌ Nie znaleziono żadnych polskich klanów w danych.
                </div>
            `;
            return;
        }

        /*
        ====================================================
        SORT
        ====================================================
        */

        all.sort((a,b)=>{

            const leagueOrder = {
                'Huragan':1,
                'Tajfun':2,
                'Sztorm':3,
                'Wicher':4,
                'Szkwał':5
            };

            const leagueDiff =
                leagueOrder[a.league] -
                leagueOrder[b.league];

            if(leagueDiff !== 0){
                return leagueDiff;
            }

            return b.rating - a.rating;

        });

        console.log('✓ Ostateczna lista klanów:', all.length);

        clans = all;

        render();

    }catch(err){

        console.error('❌ BŁĄD:', err.message);

        app.innerHTML = `
            <div class="error">
                <strong>❌ Błąd pobierania danych!</strong><br>
                ${escapeHTML(err.message)}<br><br>
                <small>Spróbuj odświeżyć stronę (F5)</small>
            </div>
        `;
    }
}

/*
========================================================
RENDER
========================================================
*/

function render(){

    const app = document.getElementById('app');

    const search = document
        .getElementById('search')
        .value
        .toLowerCase()
        .trim();

    const filtered = clans.filter(clan => {

        const searchable =
`${clan.clan_tag} ${clan.clan_name}`.toLowerCase();

        return (
            searchable.includes(search) &&
            !hidden.includes(clan.clan_tag)
        );

    });

    if(!filtered.length){

        app.innerHTML = `
            <div class="empty">
                Brak klanów do wyświetlenia.
            </div>
        `;

        return;
    }

    app.innerHTML = filtered.map((clan,index)=>`

        <div class="clan-card ${clan.l_cls}">

            <div class="clan-info">

                <span class="rank">
                    #${index + 1}
                </span>

                <span class="tag">
                    [${escapeHTML(clan.clan_tag)}]
                </span>

                <span
                class="clan-name"
                title="${escapeHTML(clan.clan_name)}">

                    ${escapeHTML(clan.clan_name)}

                </span>

                <div class="stats">

                    Pkt:
                    <span style="color:var(--gold)">
                        ${clan.rating}
                    </span>

                    |

                    WR:
                    <span class="winrate">
                        ${clan.winrate}
                    </span>

                    |

                    Liga:
                    <span class="league ${clan.badge}">
                        ${clan.league}
                    </span>

                </div>

            </div>

            <button
            class="btn-del"
            onclick="hideClan('${clan.clan_tag}')">

                <i class="fas fa-trash-alt"></i>

            </button>

        </div>

    `).join('');
}

/*
========================================================
HIDE
========================================================
*/

function hideClan(tag){

    if(hidden.includes(tag)){
        return;
    }

    hidden.push(tag);

    localStorage.setItem(
        'wows_hidden',
        JSON.stringify(hidden)
    );

    render();
}

/*
========================================================
RESET
========================================================
*/

function resetHidden(){

    if(!confirm(
        'Przywrócić wszystkie ukryte klany?'
    )){
        return;
    }

    hidden = [];

    localStorage.removeItem('wows_hidden');

    render();
}

/*
========================================================
AUTO REFRESH
========================================================
*/

setInterval(()=>{

    loadAllClans();

},300000);

/*
========================================================
START
========================================================
*/

window.addEventListener('DOMContentLoaded',()=>{

    loadAllClans();

});

</script>

</body>
</html>
