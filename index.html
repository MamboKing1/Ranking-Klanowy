<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoWs Clan Ranking</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b1016; --card: #1c2431; --accent: #00d2ff; --text: #f0f0f0; --gold: #ffcc00; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border-bottom: 3px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { font-family: 'Rajdhani', sans-serif; margin: 0; font-size: 1.4rem; color: var(--accent); letter-spacing: 1px; }
        .subtitle { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        
        #reset-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; font-weight: bold; font-family: 'Rajdhani', sans-serif; cursor: pointer; transition: 0.2s; }
        #reset-btn:active { transform: scale(0.98); background: #00b8e6; }

        .clan-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent); animation: fadeIn 0.4s ease; }
        .clan-info { flex-grow: 1; }
        .tag { font-weight: bold; color: var(--gold); font-size: 1.1rem; font-family: 'Rajdhani', sans-serif; }
        .stats { font-size: 0.85rem; color: #bbb; margin-top: 4px; }
        .winrate { font-weight: bold; margin-left: 5px; }
        .high-wr { color: #2ecc71; }
        .low-wr { color: var(--danger); }
        
        .btn-del { background: rgba(255, 71, 87, 0.15); color: var(--danger); border: 1px solid var(--danger); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-del:active { background: var(--danger); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>CLAN RANKING PRO</h1>
        <div class="subtitle">Season 33 - EU Server</div>
    </div>
    
    <button id="reset-btn" onclick="resetList()">
        <i class="fas fa-sync-alt"></i> PRZYWRÓĆ USUNIĘTE KLANY
    </button>
    
    <div id="app">Ładowanie danych...</div>

    <script>
        // Rejestracja Service Workera dla PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let hidden = JSON.parse(localStorage.getItem('hiddenClans') || '[]');
        const API_URL = "https://clans.worldofwarships.eu/api/ladder/battles/?season_id=33&realm=eu";

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                render(data.items);
            } catch (error) {
                document.getElementById('app').innerHTML = "Błąd pobierania danych. Spróbuj odświeżyć.";
            }
        }

        function render(clans) {
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            const filtered = clans.filter(c => !hidden.includes(c.clan_id));
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: #888;">Brak klanów do wyświetlenia.</div>';
                return;
            }

            filtered.forEach(c => {
                const wr = ((c.wins_count / c.battles_count) * 100);
                const wrClass = wr >= 60 ? 'high-wr' : (wr < 50 ? 'low-wr' : '');
                
                const div = document.createElement('div');
                div.className = 'clan-card';
                div.innerHTML = `
                    <div class="clan-info">
                        <span style="color: #888;">#${c.rank}</span> 
                        <span class="tag">[${c.clan_tag}]</span> 
                        <span style="font-size: 0.9rem;">${c.clan_name}</span>
                        <div class="stats">
                            Pkt: <span style="color: var(--gold)">${c.rating}</span> | 
                            WR: <span class="winrate ${wrClass}">${wr.toFixed(1)}%</span>
                        </div>
                    </div>
                    <button class="btn-del" onclick="remove(${c.clan_id})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        window.remove = (id) => {
            if(confirm("Ukryć ten klan?")) {
                hidden.push(id);
                localStorage.setItem('hiddenClans', JSON.stringify(hidden));
                fetchData();
            }
        };

        window.resetList = () => {
            if(confirm("Czy na pewno chcesz przywrócić wszystkie ukryte klany?")) {
                hidden = [];
                localStorage.removeItem('hiddenClans');
                fetchData();
            }
        };

        fetchData();
    </script>
</body>
</html>
