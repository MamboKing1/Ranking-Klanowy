<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WoWs Polish Clans</title>

<style>

body{
    background:#0b1016;
    color:white;
    font-family:Arial;
    margin:0;
    padding:10px;
}

h1{
    text-align:center;
    color:#00d2ff;
}

.card{
    background:#1c2431;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.tag{
    color:#ffcc00;
    font-weight:bold;
}

.stats{
    color:#bbb;
    margin-top:5px;
}

</style>
</head>
<body>

<h1>RANKING POLSKICH KLANÓW</h1>

<div id="app"></div>

<script>

/*
=================================================
TEST DATA
=================================================
*/

const clans = [

{
    clan_tag:"SEEYA",
    clan_name:"See you in the port",
    rating:2150,
    winrate:"62.5%",
    league:"Huragan"
},

{
    clan_tag:"P-W-C",
    clan_name:"Postrzeleni w Cytadele",
    rating:1729,
    winrate:"54.7%",
    league:"Sztorm"
},

{
    clan_tag:"GRAY",
    clan_name:"50 shades of RNG",
    rating:1709,
    winrate:"53.9%",
    league:"Sztorm"
},

{
    clan_tag:"ST0RM",
    clan_name:"The Hellish Storm",
    rating:1686,
    winrate:"53.4%",
    league:"Sztorm"
}

];

/*
=================================================
SORT
=================================================
*/

clans.sort((a,b)=>b.rating-a.rating);

/*
=================================================
RENDER
=================================================
*/

const app = document.getElementById('app');

app.innerHTML = clans.map((c,index)=>`

<div class="card">

    <div>

        #${index+1}

        <span class="tag">
            [${c.clan_tag}]
        </span>

        ${c.clan_name}

    </div>

    <div class="stats">

        Punkty: ${c.rating}
        |
        WR: ${c.winrate}
        |
        Liga: ${c.league}

    </div>

</div>

`).join('');

</script>

</body>
</html>
