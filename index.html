<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoWs Polish Clans - Sezon 33 Marlin Błękitny</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght=600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b1016; --card: #1c2431; --accent: #00d2ff; --text: #f0f0f0; --gold: #ffcc00; --danger: #ff4757; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border-bottom: 3px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { font-family: 'Rajdhani', sans-serif; margin: 0; font-size: 1.3rem; color: var(--accent); letter-spacing: 1px; }
        .subtitle { font-size: 0.75rem; color: #ffcc00; font-weight: bold; text-transform: uppercase; margin-top: 3px; }
        
        #reset-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; font-weight: bold; font-family: 'Rajdhani', sans-serif; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        #reset-btn:active { transform: scale(0.98); background: #00b8e6; }

        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--card); border: 1px solid #2d3848; border-radius: 8px; color: white; box-sizing: border-box; font-size: 1rem; }

        .clan-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .clan-info { flex-grow: 1; min-width: 0; padding-right: 10px; }
        .tag { font-weight: bold; color: var(--gold); font-size: 1.1rem; font-family: 'Rajdhani', sans-serif; text-decoration: none; }
        .tag:hover { text-decoration: underline; }
        .clan-name { font-size: 0.9rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 170px; vertical-align: middle; }
        .stats { font-size: 0.82rem; color: #bbb; margin-top: 4px; }
        .winrate { font-weight: bold; margin-left: 3px; color: #2ecc71; }
        .league { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-left: 3px; padding: 2px 5px; border-radius: 4px; display: inline-block; }
        
        /* Kolor ligi Huragan */
        .hrc { color: #ff4757; background: rgba(255, 71, 87, 0.15); } 
        .clan-card.hrc { border-left: 4px solid #ff4757; }

        /* Pozostałe style lig na przyszłość */
        .tyf { color: #ffa502; background: rgba(255, 165, 2, 0.15); } 
        .str { color: #1e90ff; background: rgba(30, 144, 255, 0.15); } 
        .gla { color: #2ed573; background: rgba(46, 213, 115, 0.15); } 
        .squ { color: #ced6e0; background: rgba(206, 214, 224, 0.15); } 
        .clan-card.tyf { border-left: 4px solid #ffa502; }
        .clan-card.str { border-left: 4px solid #1e90ff; }
        .clan-card.gla { border-left: 4px solid #2ed573; }
        .clan-card.squ { border-left: 4px solid #ced6e0; }

        .btn-del { background: rgba(255, 71, 87, 0.15); color: var(--danger); border: 1px solid var(--danger); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-del:active { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>RANKING POLSKICH KLANÓW</h1>
        <div class="subtitle">Sezon 33: Marlin Błękitny</div>
    </div>
    
    <input type="text" id="search" class="search-box" placeholder="Szukaj klanu po tagu..." oninput="render()">

    <button id="reset-btn" onclick="resetList()">
        <i class="fas fa-sync-alt"></i> PRZYWRÓĆ USUNIĘTE KLANY
    </button>
    
    <div id="app">Ładowanie rankingu...</div>

    <script>
        const LEAGUE_ORDERS = { 'Huragan': 1, 'Tajfun': 2, 'Sztorm': 3, 'Wicher': 4, 'Szkwał': 5 };

        // TYLKO JEDEN SPRAWDZONY KLAN Z JEGO ID W LINKU
        const fullClansDatabase = [
            { 
                clan_id: "500140798", 
                clan_tag: "SEEYA", 
                clan_name: "See you in the port", 
                rating: 2150, 
                winrate: "62.5%", 
                league: "Huragan", 
                l_cls: "hrc" 
            }
        ];

        // Sortowanie (przygotowane pod kolejne klany)
        fullClansDatabase.sort((a, b) => {
            const orderA = LEAGUE_ORDERS[a.league] || 99;
            const orderB = LEAGUE_ORDERS[b.league] || 99;
            if (orderA !== orderB) return orderA - orderB;
            return b.rating - a.rating;
        });

        let hidden = [];
        try { hidden = JSON.parse(localStorage.getItem('wows_marlin_single_hidden') || '[]'); } catch(e) {}

        function render() {
            const container = document.getElementById('app');
            const searchTxt = document.getElementById('search').value.toLowerCase().trim();
            container.innerHTML = '';
            
            const filtered = fullClansDatabase.filter(c => {
                const matchesSearch = c.clan_tag.toLowerCase().includes(searchTxt);
                const isNotHidden = !hidden.includes(c.clan_tag);
                return matchesSearch && isNotHidden;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: #888;">Brak klanów do wyświetlenia.</div>';
                return;
            }

            filtered.forEach((c, index) => {
                const div = document.createElement('div');
                div.className = `clan-card ${c.l_cls}`;
                div.innerHTML = `
                    <div class="clan-info">
                        <span style="color: #888; font-size: 0.9rem; font-weight: bold; margin-right: 4px;">#${index + 1}</span>
                        <a href="https://clans.worldofwarships.eu/clan-profile/${c.clan_id}" target="_blank" class="tag">[${c.clan_tag}]</a> 
                        <span class="clan-name" title="${c.clan_name}">${c.clan_name}</span>
                        <div class="stats">
                            Pkt: <span style="color: var(--gold)">${c.rating}</span> | WR: <span class="winrate">${c.winrate}</span> | 
                            Liga: <span class="league ${c.l_cls}">${c.league}</span>
                        </div>
                    </div>
                    <button class="btn-del" onclick="remove('${c.clan_tag}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        window.remove = (tag) => {
            if(!hidden.includes(tag)) {
                hidden.push(tag);
                try { localStorage.setItem('wows_marlin_single_hidden', JSON.stringify(hidden)); } catch(e) {}
                render();
            }
        };

        window.resetList = () => {
            if(confirm("Czy na pewno chcesz przywrócić ukryte klany?")) {
                hidden = [];
                try { localStorage.removeItem('wows_marlin_single_hidden'); } catch(e) {}
                render();
            }
        };

        render();
    </script>
</body>
</html>
