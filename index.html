        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; padding-bottom: 50px; }
        .header { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border-bottom: 3px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { font-family: 'Rajdhani', sans-serif; margin: 0; font-size: 1.3rem; color: var(--accent); letter-spacing: 1px; }
        .subtitle { font-size: 0.75rem; color: #ffcc00; font-weight: bold; text-transform: uppercase; margin-top: 3px; }
        
        #reset-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; font-weight: bold; font-family: 'Rajdhani', sans-serif; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        #reset-btn:active { transform: scale(0.98); background: #00b8e6; }

        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--card); border: 1px solid #2d3848; border-radius: 8px; color: white; box-sizing: border-box; font-size: 1rem; }

        .clan-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent); }
        .clan-info { flex-grow: 1; min-width: 0; padding-right: 10px; }
        .tag { font-weight: bold; color: var(--gold); font-size: 1.1rem; font-family: 'Rajdhani', sans-serif; }
        .clan-name { font-size: 0.9rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 170px; vertical-align: middle; }
        .stats { font-size: 0.82rem; color: #bbb; margin-top: 4px; }
        .winrate { font-weight: bold; margin-left: 3px; color: #2ecc71; }
        .league { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-left: 3px; padding: 2px 5px; border-radius: 4px; display: inline-block; }
        
        .hrc { color: #ff4757; background: rgba(255, 71, 87, 0.15); } 
        .tyf { color: #ffa502; background: rgba(255, 165, 2, 0.15); } 
        .str { color: #1e90ff; background: rgba(30, 144, 255, 0.15); } 
        .gla { color: #2ed573; background: rgba(46, 213, 115, 0.15); } 
        .squ { color: #ced6e0; background: rgba(206, 214, 224, 0.15); } 

        .btn-del { background: rgba(255, 71, 87, 0.15); color: var(--danger); border: 1px solid var(--danger); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-del:active { background: var(--danger); color: white; }
    </style>

        fullClansDatabase.sort((a, b) => {

            const orderB = LEAGUE_MAPPING[b.league]?.order || 99;
            if (orderA !== orderB) return orderA - orderB;
            return b.rating - a.rating;
        });

        let hidden = [];
        try {
            hidden = JSON.parse(localStorage.getItem('hidden_clans_v2') || '[]');
        } catch(e) { hidden = []; }

        function render() {
            const container = document.getElementById('app');
            const searchTxt = document.getElementById('search').value.toLowerCase().trim();
            container.innerHTML = '';
            
            const filtered = fullClansDatabase.filter(c => {
                const matchesSearch = c.clan_tag.toLowerCase().includes(searchTxt);
                const isNotHidden = !hidden.includes(c.clan_tag);
                return matchesSearch && isNotHidden;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: #888;">Brak wyników na liście klanów.</div>';
                return;
            }

            filtered.forEach((c, index) => {
                const leagueInfo = LEAGUE_MAPPING[c.league] || { name: c.league, cls: 'squ' };
                const div = document.createElement('div');
                div.className = 'clan-card';
                div.innerHTML = `

                        </div>
                    </div>
                    <button class="btn-del" onclick="remove('${c.clan_tag}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        window.remove = (tag) => {
            if(!hidden.includes(tag)) {
                hidden.push(tag);
                try { localStorage.setItem('hidden_clans_v2', JSON.stringify(hidden)); } catch(e) {}
                render();
            }
        };

        window.resetList = () => {
            if(confirm("Czy na pewno chcesz przywrócić wszystkie ukryte klany?")) {
                hidden = [];
                try { localStorage.removeItem('hidden_clans_v2'); } catch(e) {}
                render();
            }
        };
