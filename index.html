<script>

/*
========================================================
LIVE WOWS CLAN RANKING
========================================================
*/

const SEASON = 33;

const LEAGUES = [
    { id: 0, name: 'Huragan', cls: 'hrc' },
    { id: 1, name: 'Tajfun', cls: 'tyf' },
    { id: 2, name: 'Sztorm', cls: 'str' },
    { id: 3, name: 'Wicher', cls: 'gla' },
    { id: 4, name: 'Szkwał', cls: 'squ' }
];

/*
========================================================
WHITELISTA KLANÓW
TYLKO TE KLANY ZOSTANĄ POKAZANE
========================================================
*/

const allowedClans = [

"SEEYA",
"P-W-C",
"GRAY",
"ST0RM",
"PWWC",
"YERBA",
"FSO",
"EMP-6",
"SBP",
"-PGS-",
"_PL_",
"-BWM-",
"CREDO",
"-BWMA",
"F11",
"5HARK",
"F-C-P",
"CMWR",
"MORSY",
"-M-W-",
"RR1",
"CMWR2",
"CZCHB",
"MESSA",
"KOYOT",
"EPMW",
"CYRK",
"INT-M",
"-WTH-",
"BRODY",
"BH34",
"WJR",
"LARCH",
"E-BOJ",
"WOJPL",
"BMW-",
"CS-PL",
"LIGA",
"MCNC",
"PZPR",
"CZART",
"FULL",
"P_MW",
"-MHK-",
"-STP-",
"PL303",
"PMW",
"STING",
"MORZE",
"O-R-P",
"ALKO",
"BAWY",
"JEDI",
"_BFB_",
"-ZUS-",
"-FTF-",
"1PFP",
"SPOKO",
"P_I_B",
"WPRDL",
"-ZCM-",
"AGAMA",
"QRF",
"MS-B",
"YOGA",
"SD-22",
"TYTAN",
"QTAZ",
"-SG1-",
"P1RAT",
"-NBP",
"S-A-O",
"RFOX",
"GR0M",
"OUTPL",
"PDKWR"

];

const allowedSet = new Set(allowedClans);

/*
========================================================
GLOBAL
========================================================
*/

let clans = [];
let hidden = [];

/*
========================================================
LOCAL STORAGE
========================================================
*/

try {

    hidden = JSON.parse(
        localStorage.getItem('wows_hidden') || '[]'
    );

} catch (e) {

    hidden = [];

}

/*
========================================================
ESCAPE HTML
========================================================
*/

function escapeHTML(str) {

    return String(str).replace(/[&<>"']/g, m => ({

        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'

    })[m]);

}

/*
========================================================
POBIERANIE LIVE DANYCH
========================================================
*/

async function loadAllClans() {

    try {

        let all = [];

        /*
        ========================================================
        POBIERANIE KAŻDEJ LIGI
        ========================================================
        */

        for (const league of LEAGUES) {

            const url =
`https://clans.worldofwarships.com/api/ladder/structure/?realm=eu&season=${SEASON}&league=${league.id}&division=1&limit=1000&offset=0`;

            const response = await fetch(url);

            if (!response.ok) {
                continue;
            }

            const data = await response.json();

            /*
            ====================================================
            WG API
            ====================================================
            */

            const items = data.items || [];

            const mapped = items.map(clan => ({

                clan_tag: clan.tag,
                clan_name: clan.name,
                rating: clan.rating || 0,

                winrate:
                    clan.win_rate
                        ? `${Number(clan.win_rate).toFixed(1)}%`
                        : '0%',

                league: league.name,
                l_cls: league.cls

            }));

            all.push(...mapped);

        }

        /*
        ========================================================
        WHITELISTA
        ========================================================
        */

        all = all.filter(clan =>
            allowedSet.has(clan.clan_tag)
        );

        /*
        ========================================================
        SORTOWANIE
        ========================================================
        */

        all.sort((a, b) => {

            if (b.rating !== a.rating) {
                return b.rating - a.rating;
            }

            return (
                parseFloat(b.winrate) -
                parseFloat(a.winrate)
            );

        });

        clans = all;

        render();

    } catch (err) {

        console.error(err);

        document.getElementById('app').innerHTML = `
            <div class="error">
                Nie udało się pobrać danych z API WoWs.
            </div>
        `;
    }
}

/*
========================================================
RENDER
========================================================
*/

function render() {

    const app = document.getElementById('app');

    const search = document
        .getElementById('search')
        .value
        .toLowerCase()
        .trim();

    const filtered = clans.filter(clan => {

        const searchable = `
            ${clan.clan_tag}
            ${clan.clan_name}
        `.toLowerCase();

        return (
            searchable.includes(search) &&
            !hidden.includes(clan.clan_tag)
        );

    });

    /*
    ========================================================
    EMPTY
    ========================================================
    */

    if (!filtered.length) {

        app.innerHTML = `
            <div class="empty">
                Brak klanów do wyświetlenia.
            </div>
        `;

        return;
    }

    /*
    ========================================================
    RENDER LIST
    ========================================================
    */

    app.innerHTML = filtered.map((clan, index) => `

        <div class="clan-card ${clan.l_cls}">

            <div class="clan-info">

                <span class="rank">
                    #${index + 1}
                </span>

                <span class="tag">
                    [${escapeHTML(clan.clan_tag)}]
                </span>

                <span
                class="clan-name"
                title="${escapeHTML(clan.clan_name)}">

                    ${escapeHTML(clan.clan_name)}

                </span>

                <div class="stats">

                    Pkt:
                    <span style="color:var(--gold)">
                        ${clan.rating}
                    </span>

                    |

                    WR:
                    <span class="winrate">
                        ${clan.winrate}
                    </span>

                    |

                    Liga:
                    <span class="league ${clan.l_cls}">
                        ${clan.league}
                    </span>

                </div>

            </div>

            <button
            class="btn-del"
            onclick="hideClan('${clan.clan_tag}')">

                <i class="fas fa-trash-alt"></i>

            </button>

        </div>

    `).join('');

}

/*
========================================================
UKRYJ KLAN
========================================================
*/

function hideClan(tag) {

    if (hidden.includes(tag)) {
        return;
    }

    hidden.push(tag);

    localStorage.setItem(
        'wows_hidden',
        JSON.stringify(hidden)
    );

    render();

}

/*
========================================================
RESET
========================================================
*/

function resetHidden() {

    const confirmed = confirm(
        'Przywrócić wszystkie ukryte klany?'
    );

    if (!confirmed) {
        return;
    }

    hidden = [];

    localStorage.removeItem('wows_hidden');

    render();

}

/*
========================================================
AUTO REFRESH
========================================================
*/

setInterval(() => {

    loadAllClans();

}, 300000);

/*
========================================================
START
========================================================
*/

loadAllClans();

</script>
